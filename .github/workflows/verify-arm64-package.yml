name: Verify ARM64 package

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-install-and-start:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    env:
      SOURCE_DATE_EPOCH: 946684800

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Assert source versions agree
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          test -n "$version"

          assert_version() {
            label="$1"
            actual="$2"
            if [ "$actual" != "$version" ]; then
              echo "$label declares version '$actual', expected '$version'." >&2
              exit 1
            fi
          }

          assert_version "package-lock.json" "$(node -p "require('./package-lock.json').version")"
          assert_version "package-lock.json root package" "$(node -p "require('./package-lock.json').packages[''].version")"
          assert_version "Debian control" "$(sed -n 's/^Version: \(.*\)$/\1/p' packaging/debian/control)"
          assert_version "package builder" "$(sed -n 's/^PACKAGE_VERSION = "\([^"]*\)"$/\1/p' scripts/build-deb.py)"
          assert_version "setup service" "$(sed -n 's/^export const SERVICE_VERSION = "\([^"]*\)";$/\1/p' setupd/config.mjs)"
          assert_version "desktop UI" "$(sed -n 's/^const APP_VERSION = "\([^"]*\)";$/\1/p' app/page.tsx)"

          echo "CLAWBOOT_VERSION=$version" >> "$GITHUB_ENV"
          echo "BUILT_PACKAGE_ONE=/tmp/clawboot_${version}_arm64.first.deb" >> "$GITHUB_ENV"
          echo "BUILT_PACKAGE_TWO=/tmp/clawboot_${version}_arm64.second.deb" >> "$GITHUB_ENV"
          echo "RELEASE_PACKAGE=release/clawboot_${version}_arm64.deb" >> "$GITHUB_ENV"

      - name: Install project dependencies
        run: npm ci

      - name: Test, lint, and audit
        run: |
          npm test
          npm run lint
          npm audit --omit=dev

      - name: Validate Linux scripts
        run: |
          dash -n \
            desktop/clawboot \
            packaging/clawboot-helper \
            packaging/clawboot-repair \
            packaging/clawboot-service \
            packaging/debian/preinst \
            packaging/debian/postinst \
            packaging/debian/prerm \
            packaging/debian/postrm \
            scripts/install.sh

      - name: Verify Ollama download resume support
        run: |
          ollama_version="$(sed -n 's/^OLLAMA_VERSION="\([^"]*\)"/\1/p' packaging/clawboot-helper)"
          ollama_bytes="$(sed -n 's/^OLLAMA_ARCHIVE_BYTES=\([0-9]*\)/\1/p' packaging/clawboot-helper)"
          test -n "$ollama_version"
          test -n "$ollama_bytes"
          ollama_url="https://github.com/ollama/ollama/releases/download/v${ollama_version}/ollama-linux-arm64.tar.zst"
          curl --fail --silent --show-error --location --http1.1 \
            --range 1000000-1000999 --dump-header /tmp/ollama-range.headers \
            --output /tmp/ollama-range.bin "$ollama_url"
          test "$(wc -c < /tmp/ollama-range.bin)" -eq 1000
          grep --ignore-case --fixed-strings \
            "content-range: bytes 1000000-1000999/${ollama_bytes}" \
            /tmp/ollama-range.headers

      - name: Prove package builds are reproducible
        shell: bash
        run: |
          python3 scripts/build-deb.py --output "$BUILT_PACKAGE_ONE"
          python3 scripts/build-deb.py --output "$BUILT_PACKAGE_TWO"
          cmp "$BUILT_PACKAGE_ONE" "$BUILT_PACKAGE_TWO"

      - name: Preserve native ARM64 build
        uses: actions/upload-artifact@v4
        with:
          name: clawboot-${{ env.CLAWBOOT_VERSION }}-native-arm64
          path: ${{ env.BUILT_PACKAGE_ONE }}
          if-no-files-found: error
          compression-level: 0

      - name: Prove checked-in release was built from HEAD
        shell: bash
        run: |
          mapfile -t release_packages < <(find release -maxdepth 1 -type f -name 'clawboot_*_arm64.deb' | sort)
          test "${#release_packages[@]}" -eq 1
          test "${release_packages[0]}" = "$RELEASE_PACKAGE"
          (cd release && sha256sum --ignore-missing --strict --check SHA256SUMS)
          cmp "$BUILT_PACKAGE_ONE" "$RELEASE_PACKAGE"

      - name: Inspect Debian metadata
        shell: bash
        run: |
          for package in "$BUILT_PACKAGE_ONE" "$RELEASE_PACKAGE"; do
            test "$(dpkg-deb --field "$package" Architecture)" = arm64
            test "$(dpkg-deb --field "$package" Version)" = "$CLAWBOOT_VERSION"
            test "$(dpkg-deb --field "$package" Depends)" = "sudo, systemd, libc6, libstdc++6, libgcc-s1"
            dpkg-deb --info "$package"
            dpkg-deb --contents "$package"
          done

      - name: Install the verified checked-in package and start ClawBoot
        shell: bash
        run: |
          sudo apt-get install --no-install-recommends -y "./$RELEASE_PACKAGE"
          sudo apt-get check
          test -z "$(sudo dpkg --audit)"
          test "$(/opt/clawboot/runtime/bin/node --version)" = v24.18.0
          expected_version="$(dpkg-deb --field "$RELEASE_PACKAGE" Version)"
          test "$expected_version" = "$CLAWBOOT_VERSION"
          test "$(dpkg-query --show --showformat='${Version}' clawboot)" = "$expected_version"
          test "$(cat /opt/clawboot/VERSION)" = "$expected_version"
          sudo visudo -cf /etc/sudoers.d/clawboot-agent-full-access
          test "$(sudo -u openclaw sudo -n /usr/bin/id -u)" = 0
          sudo systemctl restart clawboot.service
          for attempt in $(seq 1 20); do
            if /opt/clawboot/runtime/bin/node -e \
              "fetch('http://127.0.0.1:3210/api/v1/status').then(async r => { const body = await r.json(); process.exit(r.ok && body.serviceVersion === process.argv[1] ? 0 : 1); }).catch(() => process.exit(1));" \
              "$expected_version"; then
              exit 0
            fi
            sleep 1
          done
          sudo systemctl status --no-pager clawboot.service
          exit 1
